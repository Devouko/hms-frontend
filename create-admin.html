<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Super Admin - Hospital Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #3ba8c9 0%, #4dcde8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #3ba8c9;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #3ba8c9;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #3ba8c9;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #2d8aa8;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .message {
            padding: 12px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 14px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .credentials {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
        }
        .credentials p {
            margin: 5px 0;
            font-size: 14px;
        }
        .credentials strong {
            color: #3ba8c9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 Create Super Admin Account</h1>
        <p class="subtitle">Hospital Management System - Initial Setup</p>
        
        <div class="message info">
            <strong>ℹ️ First Time Setup:</strong><br>
            This tool creates your first super admin account. You only need to do this once.
        </div>

        <form id="adminForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" value="Super Admin" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" value="admin@hospital.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" value="Admin@123456" required>
            </div>

            <button type="submit" id="submitBtn">Create Super Admin Account</button>
        </form>

        <div id="result"></div>
    </div>

    <script type="module">
        // Import Supabase credentials
        import { projectId, publicAnonKey } from './src/utils/supabase/info.js';

        const form = document.getElementById('adminForm');
        const submitBtn = document.getElementById('submitBtn');
        const result = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';
            result.innerHTML = '';

            try {
                const response = await fetch(
                    `https://${projectId}.supabase.co/functions/v1/make-server-d8a3a34f/signup`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${publicAnonKey}`,
                        },
                        body: JSON.stringify({ 
                            email, 
                            password, 
                            name, 
                            role: 'super_admin' 
                        }),
                    }
                );

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to create account');
                }

                result.innerHTML = `
                    <div class="message success">
                        <strong>✅ Success!</strong><br>
                        Super admin account created successfully!
                        <div class="credentials">
                            <p><strong>Email:</strong> ${email}</p>
                            <p><strong>Password:</strong> ${password}</p>
                            <p style="margin-top: 10px; color: #dc3545;">
                                ⚠️ Please change this password after first login!
                            </p>
                        </div>
                        <p style="margin-top: 15px;">
                            You can now close this page and login to the application.
                        </p>
                    </div>
                `;
                
                form.style.display = 'none';

            } catch (error) {
                result.innerHTML = `
                    <div class="message error">
                        <strong>❌ Error:</strong><br>
                        ${error.message}
                        <p style="margin-top: 10px; font-size: 12px;">
                            Common issues:<br>
                            • Email already registered<br>
                            • Backend function not deployed<br>
                            • Invalid Supabase credentials
                        </p>
                    </div>
                `;
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Super Admin Account';
            }
        });
    </script>
</body>
</html>
